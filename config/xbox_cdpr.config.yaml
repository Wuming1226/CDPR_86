axis_linear:
  x: 1  # Left thumb stick vertical
  y: 0  # Left thumb stick horizontal
  z: 4  # Right thumb stick vertical
scale_linear:
  x: -0.05
  y: -0.05
  z: 0.05
scale_linear_turbo:
  x: -0.1
  y: -0.1
  z: 0.1

axis_angular:
  yaw: 0
scale_angular:
  yaw: 0.0
scale_angular_turbo:
  yaw: 0.0

enable_button: 4  # Left trigger button
enable_turbo_button: 5  # Right trigger button
